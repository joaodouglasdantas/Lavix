services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lavix
      POSTGRES_PASSWORD: lavix
      POSTGRES_DB: lavix_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lavix -d lavix_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: bin/rails server -b 0.0.0.0
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://lavix:lavix@db:5432/lavix_development
    depends_on:
      db:
        condition: service_healthy
    tty: true
    stdin_open: true

  css:
    build: .
    command: >
      bundle exec tailwindcss
      -i app/assets/stylesheets/application.tailwind.css
      -o app/assets/builds/application.css
      -c config/tailwind.config.js
      --watch --poll
    restart: unless-stopped
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - web

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  bundle_cache:
